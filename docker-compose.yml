services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idp-backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./terraform:/app/terraform
      - ../scripts:/app/scripts
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./idp.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: idp-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
